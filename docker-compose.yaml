services:
  app:
    build: .
    ports:
      - ${PORT}:${PORT}
    environment:
      - FIRESTORE_EMULATOR_HOST=firestore_emulator:8080
      - FIRESTORE_PROJECT_ID=${FIRESTORE_PROJECT_ID}
      - PORT=${PORT}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_SECONDS_TO_EXPIRATION=${JWT_SECONDS_TO_EXPIRATION}
    depends_on:
      firestore_emulator:
        condition: service_healthy
  firestore_emulator:
    image: 'andreysenov/firebase-tools'
    entrypoint: /bin/sh -c
    command: >
      "LATEST=$(ls -td /data/firestore_export_* 2>/dev/null | head -1);
      if [ -n \"$$LATEST\" ]; then
        firebase emulators:start --only firestore --project ${FIRESTORE_PROJECT_ID} --import=$$LATEST --export-on-exit=/data;
      else
        firebase emulators:start --only firestore --project ${FIRESTORE_PROJECT_ID} --export-on-exit=/data;
      fi"
    ports:
      - ${FIRESTORE_EMULATOR_PORT}:8080
    volumes:
      - ./firebase.json:/home/node/firebase.json
      - ./firestore-data:/data
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:8080', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes: {}
